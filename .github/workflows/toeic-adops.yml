name: TOEIC ad-ops hằng ngày

# Engine ad-ops headless trên GitHub Actions (always-on). Cron LUÔN theo UTC → 10:07 VN = 03:07 UTC, 14:07 VN = 07:07 UTC.
# Chống gửi trùng BỀN VỮNG: cờ "đã gửi" commit vào repo (automation/products/toeic/state/). Mỗi lần chạy đọc
# cờ mới nhất từ main → đã có cờ ngày mục tiêu thì SKIP. Đảm bảo gửi đúng 1 lần dù cron bị trễ/lặp.
# ⚠️ Lịch chỉ chạy khi file này nằm trên nhánh mặc định (main).
on:
  schedule:
    - cron: "7 3 * * *"   # 10:07 giờ VN
    - cron: "7 7 * * *"   # 14:07 giờ VN
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Chạy thử — KHÔNG gửi Telegram"
        type: boolean
        default: false

concurrency:
  group: toeic-adops      # serialize: lần chạy sau chỉ bắt đầu (và checkout cờ mới) sau khi lần trước xong
  cancel-in-progress: false

permissions:
  contents: write          # để commit cờ "đã gửi" vào repo

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4   # lấy main mới nhất → gồm cờ "đã gửi" của lần chạy trước trong ngày

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài Chrome (để xuất PDF)
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Chạy ad-ops TOEIC
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          CHROME_EXTRA_ARGS: "--no-sandbox --disable-dev-shm-usage"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 automation/engine/run_daily.py --product toeic --dry-run
          else
            python3 automation/engine/run_daily.py --product toeic
          fi

      - name: Lưu cờ "đã gửi" vào repo (chống gửi trùng)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain automation/products/toeic/state)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add automation/products/toeic/state
            git commit -m "chore(adops): TOEIC đã gửi báo cáo $(date +%F) [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              echo "push lần $i trượt (có commit mới trên main) — rebase & thử lại"; sleep 3
            done
          else
            echo "Không gửi lần này (SKIP/alert) — không có cờ mới để commit."
          fi
