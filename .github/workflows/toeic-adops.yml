name: TOEIC ad-ops hằng ngày

# Chạy engine ad-ops headless trên GitHub Actions (always-on, không phụ thuộc laptop/n8n).
# Cron của GitHub LUÔN theo giờ UTC → 10:07 VN = 03:07 UTC, 14:07 VN = 07:07 UTC.
# ⚠️ Lịch (schedule) CHỈ chạy khi file workflow này nằm trên nhánh mặc định (main) → cần merge PR #8.
on:
  schedule:
    - cron: "7 3 * * *"   # 10:07 giờ VN
    - cron: "7 7 * * *"   # 14:07 giờ VN
  workflow_dispatch:       # cho phép bấm "Run workflow" để chạy tay
    inputs:
      dry_run:
        description: "Chạy thử — KHÔNG gửi Telegram"
        type: boolean
        default: false

concurrency:
  group: toeic-adops
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài Chrome (để xuất PDF)
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Tính ngày VN (khóa cache chống gửi trùng)
        run: echo "RUN_DATE=$(date +%F)" >> "$GITHUB_ENV"

      - name: Giữ cờ đã-gửi giữa lần 10h và 14h cùng ngày
        uses: actions/cache@v4
        with:
          path: automation/products/toeic/.work
          key: toeic-adops-sent-${{ env.RUN_DATE }}

      - name: Chạy ad-ops TOEIC
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          CHROME_EXTRA_ARGS: "--no-sandbox --disable-dev-shm-usage"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 automation/engine/run_daily.py --product toeic --dry-run
          else
            python3 automation/engine/run_daily.py --product toeic
          fi
